name = "yepyeniwatch"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Static assets (frontend dosyaları)
[assets]
directory = "../frend"
binding = "ASSETS"

# Environment variables (gerekirse)
[vars]
ENVIRONMENT = "production"

# KV namespaces (cache için)
# Local development için preview_id kullanılır
# Production için: wrangler kv:namespace create CACHE komutu ile oluşturun
[[kv_namespaces]]
binding = "CACHE"
id = "yepyeniwatch-cache"
preview_id = "yepyeniwatch-cache-preview"

# Routes (özel domain kullanıyorsanız)
# routes = [
#   { pattern = "yepyeniwatch.xyz/*", zone_name = "yepyeniwatch.xyz" }
# ]
